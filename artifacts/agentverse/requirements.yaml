packages:
  "framer-motion": "For fluid, complex animations requested in the design system (feed items, log streaming)"
  "lucide-react": "For UI icons"
  "clsx": "For conditional class merging"
  "tailwind-merge": "For merging Tailwind classes in utility functions"
